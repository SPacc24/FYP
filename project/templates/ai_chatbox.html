<aside class="ai-sidebar" id="ai-assistant">
  <div class="ai-sidebar-inner">
    <span class="label">AI Assistant</span>
    <h2>AI Chatbox</h2>

    <p class="muted">
      Ask about scan findings, MITRE techniques, attack mode reasoning, Caldera results, or report interpretation.
    </p>
    <p class="small muted" id="aiStatusText">Checking local AI service...</p>

    <div id="aiChatBox" class="ai-chat-box">
      <div class="ai-message ai-message-assistant">
        <strong>AI:</strong>
        <p>AI Assistant ready. Ask a question about this assessment.</p>
      </div>
    </div>

    <div class="ai-input-row">
      <input
        id="aiChatInput"
        type="text"
        placeholder="Ask why this technique was recommended..."
      />

      <button class="button" id="aiChatSendBtn" type="button">
        Ask
      </button>
    </div>
  </div>
</aside>
