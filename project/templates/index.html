<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPenTest Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="page input-page">
    <section class="hero">
      <p class="eyebrow">Automated Penetration Testing Platform</p>
      <h1>Scan Configuration</h1>
      <p class="muted">
        Configure your scan settings to start analyzing the target system.
      </p>
    </section>

    <section class="card form-card">
      <form action="{{ url_for('scan') }}" method="POST">
        <label>
          <span class="label">Target IP / Hostname</span>
          <input type="text" name="target" placeholder="192.168.86.127" required />
        </label>

        <label>
          <span class="label">Ports</span>
          <input type="text" name="ports" value="1-1000" placeholder="80,443,3389 or 1-5000" />
        </label>

        <label>
          <span class="label">Intensity</span>
          <select name="intensity">
            <option value="2">T2 - Careful</option>
            <option value="3" selected>T3 - Balanced</option>
            <option value="4">T4 - Faster</option>
            <option value="5">T5 - Aggressive</option>
          </select>
        </label>

        <label>
          <span class="label">Scan Profile</span>
          <select name="profile">
            <option value="quick">Quick - basic version detection</option>
            <option value="standard" selected>Standard - version + default scripts</option>
            <option value="deep">Deep - OS + aggressive version detection</option>
          </select>
        </label>
        
        <!-- edited -->
<label>
  <span class="label">Attack Technique Mode</span>
  <select name="technique_mode" required>
    <option value="auto">Auto - AI selects techniques automatically</option>
    <option value="hybrid" selected>Hybrid - AI recommends, analyst can edit</option>
    <option value="manual">Manual - analyst selects techniques manually</option>
  </select>
</label>
<!-- edited -->
 
        <button class="button" type="submit">Run Scan</button>
      </form>
    </section>
  </main>
  <footer class="footer">
  <p>
    Automated Penetration Testing · Group 6 · Last updated: 5 May 2026
  </p>
</footer>
</body>
</html>
