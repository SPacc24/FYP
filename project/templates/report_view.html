<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment Report</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="page">
    <header class="hero compact-hero">
      <p class="eyebrow">AI-Assisted Assessment Report</p>
      <h1>{{ scan.target_ip }}</h1>
      <p class="muted">
        Generated from scan evidence, MITRE mapping, validation results, CALDERA output, and remediation notes.
      </p>
      <div class="actions">
        <a class="button secondary" href="{{ url_for('latest') }}">Back to Dashboard</a>
        <a class="button" href="{{ url_for('export_report') }}">Download Text Report</a>
      </div>
    </header>

    <section class="flow-card">
      <div class="flow-card-header">
        <span class="label">Report</span>
        <h2>Assessment Summary</h2>
      </div>
      <pre class="report-preview">{{ report }}</pre>
    </section>
  </main>
</body>
</html>
